<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIMA GALERIA · ArPa</title>
  <meta name="description" content="Catálogo da participação da LIMA GALERIA na ArPa Feira de Arte." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #0a0a0a;
      --gray-900: #1a1a1a;
      --gray-600: #5a5a5a;
      --gray-400: #9a9a9a;
      --gray-200: #e5e5e5;
      --gray-100: #f5f5f3;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }

    html, body { height: 100%; }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      color: var(--black);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Header ===== */
    header {
      padding: 28px 24px;
      border-bottom: 1px solid var(--gray-200);
      text-align: center;
    }

    .brand-logo {
      display: inline-block;
      height: 220px;
      width: auto;
      max-width: 900px;
      object-fit: contain;
    }

    /* ===== Main / hero ===== */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 72px 24px 40px;
      text-align: center;
    }

    .exhibition-logo {
      display: block;
      max-width: 440px;
      width: 100%;
      height: auto;
      margin: -20px auto 24px;
    }

    .lead {
      font-size: 17px;
      color: var(--gray-600);
      max-width: 460px;
      margin: 0 auto 56px;
      font-weight: 400;
    }

    /* ===== Form ===== */
    form {
      max-width: 420px;
      margin: 0 auto;
      text-align: left;
    }

    .field { margin-bottom: 22px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--gray-200);
      background: transparent;
      font-size: 16px;
      font-weight: 400;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus { border-bottom-color: var(--black); }
    input::placeholder { color: var(--gray-400); font-weight: 400; }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 32px;
      margin-top: 16px;
      background: var(--black);
      color: var(--white);
      border: 1px solid var(--black);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      background: var(--white);
      color: var(--black);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px;
      background: #fef2f2;
      border-left: 2px solid #dc2626;
      color: #991b1b;
      font-size: 14px;
    }
    .error-msg.show { display: block; }

    .privacy {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--gray-400);
      letter-spacing: 0.02em;
    }

    /* ===== Catalog (revealed) ===== */
    .catalog {
      display: none;
      animation: fadeIn 0.6s ease;
    }
    .catalog.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 24px;
      text-align: center;
    }

    .exhibition-logo--small {
      max-width: 300px;
      margin: -10px auto 8px;
    }

    .catalog p {
      text-align: center;
      color: var(--gray-600);
      margin-bottom: 40px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .fallback-note {
      text-align: center;
      font-size: 13px;
      color: var(--gray-400);
      margin-top: 8px;
    }
    .fallback-note a {
      color: var(--gray-600);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .fallback-note a:hover { color: var(--black); }

    /* ===== Footer ===== */
    footer {
      margin-top: 80px;
      padding: 32px 24px;
      border-top: 1px solid var(--gray-200);
      text-align: center;
      color: var(--gray-600);
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--black);
      text-decoration: none;
      border-bottom: 1px solid var(--gray-200);
      transition: border-color 0.2s ease;
    }
    footer a:hover { border-bottom-color: var(--black); }

    /* ===== Wider main when catalog visible ===== */
    main.expanded { max-width: 960px; }

    @media (max-width: 600px) {
      main { padding: 48px 20px 32px; }
      .exhibition-logo { max-width: 320px; margin: -10px auto 16px; }
      .lead { margin-bottom: 40px; }
      .brand-logo { height: 140px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="assets/lima-galeria.png" alt="Lima Galeria" class="brand-logo" />
  </header>

  <main id="main">

    <!-- ===== FORM STATE ===== -->
    <section id="form-section">
      <img src="assets/arpa.png" alt="ArPa · Feira de Arte" class="exhibition-logo" />
      <p class="lead">Preencha seus dados para acessar nosso catálogo completo.</p>

      <form id="lead-form" novalidate>
        <div class="field">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" required autocomplete="name" placeholder="Seu nome" />
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="voce@email.com" />
        </div>

        <div class="field">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" required autocomplete="tel" placeholder="(00) 00000-0000" maxlength="15" />
        </div>

        <button type="submit" class="btn" id="submit-btn">Acessar catálogo</button>

        <div class="error-msg" id="error-msg"></div>

        <p class="privacy">Seus dados serão usados apenas para contato sobre nossas exposições.</p>
      </form>
    </section>

    <!-- ===== CATALOG STATE (hidden initially) ===== -->
    <section class="catalog" id="catalog-section">
      <div class="success-eyebrow">Obrigado · Acesso liberado</div>
      <img src="assets/arpa.png" alt="ArPa · Feira de Arte" class="exhibition-logo exhibition-logo--small" />
      <p>O catálogo foi aberto em uma nova aba. Boa visita.</p>

      <p class="fallback-note">
        Caso a nova aba não tenha aberto,
        <a id="catalog-link"
           href="https://drive.google.com/file/d/1VftVSNwt_XtWvMZiNXithDji6evkrojZ/view?usp=sharing"
           target="_blank"
           rel="noopener">clique aqui</a>.
      </p>
    </section>

  </main>

  <footer>
    <p>Lima Galeria · <a href="https://www.instagram.com/lima_galeria" target="_blank" rel="noopener">@lima_galeria</a></p>
  </footer>

  <script>
    // ====== CONFIG ======
    const SHEETS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzqF_MAY5dSa_4i6OwdV6KqNZJAaLLY3HLTgbw535nhfbOQ6DzAEwSW9BJt-fe2grQABA/exec';
    const CATALOG_URL = 'https://drive.google.com/file/d/1VftVSNwt_XtWvMZiNXithDji6evkrojZ/view?usp=sharing';

    // ====== Helpers ======
    const $ = (s) => document.querySelector(s);
    const telInput = $('#telefone');
    const form = $('#lead-form');
    const submitBtn = $('#submit-btn');
    const errorBox = $('#error-msg');

    // Máscara BR para telefone
    telInput.addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '').slice(0, 11);
      if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 6) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d{0,5}).*/, '($1) $2');
      } else if (v.length > 0) {
        v = v.replace(/^(\d{0,2}).*/, '($1');
      }
      e.target.value = v;
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }
    function clearError() {
      errorBox.classList.remove('show');
      errorBox.textContent = '';
    }

    function validate(data) {
      if (!data.nome || data.nome.trim().length < 2) return 'Por favor, informe seu nome completo.';
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) return 'Por favor, informe um e-mail válido.';
      const digits = data.telefone.replace(/\D/g, '');
      if (digits.length < 10) return 'Por favor, informe um telefone válido com DDD.';
      return null;
    }

    function revealCatalog() {
      $('#form-section').style.display = 'none';
      $('#catalog-section').classList.add('show');
      $('#main').classList.add('expanded');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      try { localStorage.setItem('lima_galeria_unlocked', '1'); } catch (e) {}
    }

    try {
      if (localStorage.getItem('lima_galeria_unlocked') === '1') {
        revealCatalog();
      }
    } catch (e) {}

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const data = {
        nome: $('#nome').value.trim(),
        email: $('#email').value.trim(),
        telefone: telInput.value.trim(),
        origem: 'ArPa',
        timestamp: new Date().toISOString(),
      };

      const err = validate(data);
      if (err) { showError(err); return; }

      // Abre o catálogo IMEDIATAMENTE em nova aba — isso precisa acontecer de forma
      // síncrona dentro do handler de submit para não ser bloqueado pelo popup blocker.
      window.open(CATALOG_URL, '_blank', 'noopener');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando...';

      try {
        if (SHEETS_ENDPOINT && !SHEETS_ENDPOINT.startsWith('COLE_AQUI')) {
          await fetch(SHEETS_ENDPOINT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(data),
          });
        } else {
          console.warn('SHEETS_ENDPOINT não configurado — dados:', data);
        }
      } catch (err) {
        console.error(err);
      }

      revealCatalog();
    });
  </script>

</body>
</html>
